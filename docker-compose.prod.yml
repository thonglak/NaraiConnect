# Production compose for NaraiConnect Admin (Laravel + Livewire).
#
# Usage:
#   cp apps/admin/.env apps/admin/.env.production   # then edit for prod values
#   docker compose -f docker-compose.prod.yml build admin
#   docker compose -f docker-compose.prod.yml up -d
#
# The host's external nginx is expected to terminate TLS and forward
# /connect_man/* → http://localhost:${ADMIN_PROD_PORT}/.
# Set APP_URL in apps/admin/.env.production accordingly
# (e.g. https://apps.naraiproperty.com/connect_man).

services:
  admin:
    build:
      context: .
      dockerfile: docker/admin.prod.Dockerfile
    image: ncadm/admin:prod
    container_name: ncadm_admin_prod
    env_file: apps/admin/.env.production
    ports:
      - "${ADMIN_PROD_PORT:-8000}:80"
    volumes:
      # Persisted between deploys: storage (logs, framework caches, sessions if file driver).
      - admin_storage:/var/www/html/storage
    networks:
      - back_db_network
      - default
    restart: unless-stopped

networks:
  back_db_network:
    external: true
  default:
    name: ncadm_prod_network

volumes:
  admin_storage:
