# NaraiConnect Admin — nginx reverse-proxy config
# Mounts the admin app at https://apps.naraiproperty.com/connect_man/
#
# Two ways to use:
#   1. Paste the `location ^~ /connect_man/ { ... }` block into the existing
#      server block of apps.naraiproperty.com (recommended).
#   2. Use the full server block below as-is and `include` this file from
#      your nginx config.
#
# After edit:
#   nginx -t && systemctl reload nginx

# ─── Option 1: drop-in location block ──────────────────────────────────
# Paste inside your existing `server { listen 443 ssl ...; server_name
# apps.naraiproperty.com; ... }` block.

location = /connect_man {
    return 301 https://$host/connect_man/;
}

location ^~ /connect_man/ {
    # Strip the /connect_man/ prefix before forwarding to the Laravel
    # container. Laravel sees the request path as if mounted at /.
    rewrite ^/connect_man/(.*)$ /$1 break;

    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header X-Forwarded-Prefix /connect_man;

    # Buffering off so Livewire long-poll-style updates feel snappy.
    proxy_buffering    off;
    proxy_read_timeout 60s;

    client_max_body_size 16m;
}

# ─── Option 2: standalone vhost (only if NOT pasting into an existing one) ─
# server {
#     listen 443 ssl http2;
#     server_name apps.naraiproperty.com;
