services:
  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    container_name: ncadm_admin
    working_dir: /app/apps/admin
    command: >
      sh -c "(npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0) &
             php artisan serve --host=0.0.0.0 --port=8080"
    ports:
      - "${ADMIN_PORT:-8000}:8080"
      - "5173:5173"
    volumes:
      - ./:/app
      - admin_vendor:/app/apps/admin/vendor
      - admin_node_modules:/app/apps/admin/node_modules
    networks:
      - back_db_network
      - default
    restart: unless-stopped

networks:
  back_db_network:
    external: true
  default:
    name: ncadm_network

volumes:
  admin_vendor:
  admin_node_modules:
